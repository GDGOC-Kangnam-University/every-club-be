spring:
  application:
    name: every-club
  datasource:
    url: jdbc:postgresql://localhost:5432/every-club
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000

s3:
  endpoint: ${S3_ENDPOINT:https://storage.googleapis.com}
  region: ${S3_REGION:auto}
  access-key: ${S3_ACCESS_KEY:dummy}
  secret-key: ${S3_SECRET_KEY:dummy}
  bucket: ${S3_BUCKET:every-club-storage}

email:
  from: ${EMAIL_FROM:noreply@everyclub.com}

otp:
  rate-limit:
    max-requests: 5
    window-seconds: 300

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET}
  expiration: 120

---

spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  springdoc:
    api-docs:
      enabled: false
    swagger-ui:
      enabled: false

jwt:
  secret: dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci10ZXN0aW5nLXB1cnBvc2VzLW9ubHktZG8tbm90LXVzZS1pbi1wcm9kdWN0aW9uISEhISEh
  expiration: 120

---

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}

s3:
  endpoint: ${S3_ENDPOINT:https://storage.googleapis.com}
  region: ${S3_REGION:auto}
  access-key: ${S3_ACCESS_KEY}
  secret-key: ${S3_SECRET_KEY}
  bucket: ${S3_BUCKET:every-club-storage}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:120}
